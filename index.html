<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵平骁的个人主页</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .welcome-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px 60px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 2.5em;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>欢迎来到赵平骁的个人主页</h1>
        <p>很高兴你在这里！</p>
    </div>
</body>
</html>
